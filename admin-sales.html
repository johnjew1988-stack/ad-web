<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AD Tech - Sales Order</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://js.stripe.com/v3/" async></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
      :root {
        --bg: #07131b;
        --bg2: #041018;
        --panel: rgba(10, 25, 36, 0.92);
        --panel-soft: rgba(12, 31, 44, 0.68);
        --text: #effcff;
        --muted: #95b8c7;
        --line: rgba(104, 228, 209, 0.18);
        --brand: #1bc6b0;
        --brand-deep: #0c5f95;
        --danger: #ffb2b8;
        --success: #9ef3db;
        --warn: #f5c97a;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", system-ui, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(27, 198, 176, 0.18), transparent 34%),
          radial-gradient(circle at top right, rgba(12, 95, 149, 0.24), transparent 30%),
          linear-gradient(180deg, #041018, var(--bg));
      }

      h1, h2, h3, h4, p { margin: 0; }

      .shell {
        width: min(1100px, calc(100% - 2rem));
        margin: 0 auto;
        padding: 2rem 0 4rem;
        display: grid;
        gap: 1rem;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--panel);
        padding: 1.35rem;
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.22);
      }

      .panel-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
        margin-bottom: 1.25rem;
      }

      .muted { color: var(--muted); }

      .layout {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 1rem;
        align-items: start;
      }

      @media (max-width: 780px) {
        .layout { grid-template-columns: 1fr; }
      }

      /* ── Buttons ── */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        border: 1px solid transparent;
        border-radius: 14px;
        padding: 0.72rem 1rem;
        font: inherit;
        font-size: 0.9rem;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
        transition: opacity 0.15s, transform 0.1s;
      }
      .btn:active { transform: scale(0.97); }
      .btn.main {
        color: #fff;
        background: linear-gradient(135deg, var(--brand), var(--brand-deep));
      }
      .btn.alt {
        color: var(--text);
        background: rgba(255, 255, 255, 0.05);
        border-color: var(--line);
      }
      .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

      /* ── Cart ── */
      .cart-section { display: grid; gap: 0.9rem; }

      .cart-items {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 0.55rem;
        min-height: 60px;
      }

      .cart-item {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 0.7rem 0.85rem;
        background: var(--panel-soft);
        display: grid;
        gap: 0.2rem;
      }

      .cart-item-top {
        display: flex;
        justify-content: space-between;
        gap: 0.5rem;
        align-items: flex-start;
      }

      .cart-item-name { font-weight: 700; }

      .cart-item-meta { color: var(--muted); font-size: 0.86rem; }

      .cart-item-controls {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        margin-top: 0.35rem;
      }

      .qty-btn {
        width: 26px;
        height: 26px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: rgba(255,255,255,0.06);
        color: var(--text);
        cursor: pointer;
        font-weight: 700;
        font-size: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s;
      }
      .qty-btn:hover { background: rgba(27,198,176,0.18); }

      .qty-value { font-weight: 700; min-width: 24px; text-align: center; font-size: 0.9rem; }

      .remove-btn {
        border: none;
        background: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 0.8rem;
        padding: 2px 6px;
        border-radius: 6px;
        transition: color 0.15s;
        margin-left: auto;
      }
      .remove-btn:hover { color: var(--danger); }

      .cart-empty { color: var(--muted); font-size: 0.92rem; padding: 1rem 0; }

      .cart-summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.75rem;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--panel-soft);
        font-weight: 700;
      }

      .cart-total-amount { font-size: 1.1rem; color: var(--brand); }

      /* ── Checkout form ── */
      .checkout-section { display: grid; gap: 0.9rem; }

      .field {
        display: grid;
        gap: 0.32rem;
      }

      .field label {
        color: var(--muted);
        font-size: 0.85rem;
        font-weight: 600;
      }

      .field input,
      .field select,
      .field textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel-soft);
        color: var(--text);
        font: inherit;
        font-size: 0.93rem;
        padding: 0.68rem 0.8rem;
        outline: none;
        transition: border-color 0.15s;
      }
      .field input:focus,
      .field select:focus { border-color: var(--brand); }

      .payment-badges {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .payment-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 80px;
        padding: 0.38rem 0.7rem;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.08);
        color: #fff;
        font-size: 0.76rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .payment-badge.visa { background: linear-gradient(135deg, #1a1f71, #2155f5); }
      .payment-badge.mastercard { background: linear-gradient(135deg, #ea001b, #ff8c1a); }

      .payment-note,
      .payment-hint { color: var(--muted); font-size: 0.84rem; }

      .card-element-shell {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(8, 20, 29, 0.78);
        padding: 0.82rem 0.75rem;
        min-height: 48px;
      }

      .bank-transfer-details {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel-soft);
        padding: 0.75rem 0.9rem;
        font-size: 0.84rem;
      }

      .bank-transfer-title { font-weight: 700; margin-bottom: 0.5rem; }

      .bank-transfer-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 0.3rem;
      }

      .bank-transfer-list li { display: flex; gap: 0.5rem; }
      .bank-transfer-list span { color: var(--muted); min-width: 130px; }

      .checkout-actions {
        display: flex;
        gap: 0.7rem;
        align-items: center;
        flex-wrap: wrap;
      }

      .status {
        font-size: 0.88rem;
        color: var(--muted);
      }
      .status.error { color: var(--danger); }
      .status.success { color: var(--success); }
      .status.warn { color: var(--warn); }

      /* ── Product mini catalog ── */
      .product-mini-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 0.65rem;
        margin-top: 0.9rem;
      }

      .product-mini-card {
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 0.85rem;
        background: var(--panel-soft);
        display: grid;
        gap: 0.4rem;
        align-content: start;
      }

      .product-mini-card h4 { font-size: 0.9rem; }
      .product-mini-card p { font-size: 0.8rem; color: var(--muted); }

      .product-category-tag {
        display: inline-flex;
        align-self: start;
        padding: 0.18rem 0.5rem;
        border-radius: 999px;
        border: 1px solid var(--line);
        color: var(--muted);
        font-size: 0.72rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .product-empty {
        border: 1px dashed var(--line);
        border-radius: 14px;
        padding: 1.2rem;
        color: var(--muted);
        font-size: 0.9rem;
        margin-top: 0.9rem;
      }

      /* ── Nav bar ── */
      .top-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
        margin-bottom: 0.25rem;
      }

      .top-bar-brand {
        font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 800;
        font-size: 1.15rem;
        color: var(--brand);
        text-decoration: none;
      }

      .top-bar-nav {
        display: flex;
        gap: 0.6rem;
        flex-wrap: wrap;
        align-items: center;
      }

      .token-wrap {
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }

      .token-wrap label {
        color: var(--muted);
        font-size: 0.8rem;
        white-space: nowrap;
      }

      .token-wrap input {
        background: var(--panel-soft);
        border: 1px solid var(--line);
        border-radius: 10px;
        color: var(--text);
        font: inherit;
        font-size: 0.82rem;
        padding: 0.42rem 0.65rem;
        width: 170px;
        outline: none;
        transition: border-color 0.15s;
      }
      .token-wrap input:focus { border-color: var(--brand); }

      /* ── Tabs ── */
      .tab-bar {
        display: flex;
        gap: 0.5rem;
        padding: 0.25rem;
        background: var(--panel-soft);
        border: 1px solid var(--line);
        border-radius: 16px;
        width: fit-content;
      }

      .tab-btn {
        border: none;
        background: none;
        color: var(--muted);
        font: inherit;
        font-size: 0.88rem;
        font-weight: 700;
        padding: 0.5rem 1.1rem;
        border-radius: 12px;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }
      .tab-btn:hover { color: var(--text); background: rgba(27,198,176,0.08); }
      .tab-btn.active { background: rgba(27,198,176,0.18); color: var(--brand); }

      /* ── Quotation table ── */
      .quote-table-wrap { overflow-x: auto; }

      .quote-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.86rem;
      }

      .quote-table thead th {
        text-align: left;
        color: var(--muted);
        font-size: 0.76rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        padding: 0.5rem 0.75rem;
        border-bottom: 1px solid var(--line);
      }

      .quote-table tbody tr {
        border-bottom: 1px solid rgba(104,228,209,0.08);
        transition: background 0.12s;
      }
      .quote-table tbody tr:hover { background: rgba(27,198,176,0.06); }

      .quote-table tbody td { padding: 0.62rem 0.75rem; vertical-align: middle; }

      .quote-status-pill {
        display: inline-flex;
        padding: 0.2rem 0.6rem;
        border-radius: 999px;
        font-size: 0.74rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .qs-draft    { background: rgba(149,184,199,0.15); color: var(--muted); }
      .qs-sent     { background: rgba(27,198,176,0.14);  color: var(--brand); }
      .qs-accepted { background: rgba(158,243,219,0.14); color: var(--success); }
      .qs-declined { background: rgba(255,178,184,0.14); color: var(--danger); }
      .qs-expired  { background: rgba(245,201,122,0.14); color: var(--warn); }

      .quote-action-btn {
        border: 1px solid var(--line);
        background: rgba(255,255,255,0.04);
        color: var(--text);
        font: inherit;
        font-size: 0.78rem;
        font-weight: 700;
        padding: 0.28rem 0.6rem;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
        white-space: nowrap;
      }
      .quote-action-btn:hover { background: rgba(27,198,176,0.14); color: var(--brand); border-color: rgba(27,198,176,0.4); }
      .quote-action-btn.danger:hover { background: rgba(255,178,184,0.14); color: var(--danger); border-color: rgba(255,178,184,0.4); }

      .quote-empty {
        text-align: center;
        color: var(--muted);
        padding: 2rem;
        font-size: 0.9rem;
      }

      /* ── New Quote Modal ── */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(4, 16, 24, 0.82);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 2rem 1rem 2rem;
        z-index: 100;
        overflow-y: auto;
      }

      .modal-overlay[hidden] { display: none; }

      .modal-box {
        background: #061926;
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 1.75rem;
        width: min(680px, 100%);
        display: grid;
        gap: 1rem;
      }

      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      .modal-close {
        border: none;
        background: rgba(255,255,255,0.06);
        color: var(--muted);
        width: 32px;
        height: 32px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s;
      }
      .modal-close:hover { background: rgba(255,178,184,0.18); color: var(--danger); }

      /* ── Line items builder ── */
      .line-items-list { display: grid; gap: 0.5rem; }

      .line-item-row {
        display: grid;
        grid-template-columns: 1fr 80px 110px 32px;
        gap: 0.4rem;
        align-items: center;
      }

      @media (max-width: 560px) {
        .line-item-row { grid-template-columns: 1fr 1fr; }
        .line-item-row > :last-child { grid-column: span 2; }
      }

      .line-item-row input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--panel-soft);
        color: var(--text);
        font: inherit;
        font-size: 0.86rem;
        padding: 0.5rem 0.6rem;
        outline: none;
      }
      .line-item-row input:focus { border-color: var(--brand); }

      .line-item-remove {
        border: 1px solid var(--line);
        background: none;
        color: var(--muted);
        width: 30px;
        height: 30px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s, color 0.15s;
      }
      .line-item-remove:hover { background: rgba(255,178,184,0.14); color: var(--danger); }

      .quote-total-row {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 0.75rem;
        font-weight: 700;
        font-size: 1rem;
        padding-top: 0.5rem;
        border-top: 1px solid var(--line);
      }

      .quote-total-value { color: var(--brand); font-size: 1.1rem; }
  </head>
  <body>
    <div class="shell">

      <!-- Top bar -->
      <div class="top-bar">
        <a class="top-bar-brand" href="index.html">AD Tech</a>
        <nav class="top-bar-nav">
          <div class="token-wrap">
            <label for="adminTokenField">Admin Token</label>
            <input id="adminTokenField" type="password" placeholder="Enter if required" autocomplete="current-password" />
          </div>
          <a class="btn alt" href="admin.html">← Admin</a>
          <a class="btn alt" href="index.html#purchase">Storefront</a>
          <a class="btn alt" href="admin-finance.html">Finance</a>
          <a class="btn alt" href="admin-products.html">Products</a>
        </nav>
      </div>

      <!-- Page header -->
      <div class="panel">
        <h1 style="font-family:'Bricolage Grotesque',sans-serif;">Sales</h1>
        <p class="muted" style="margin-top:0.3rem;">Manage quotations and process sales orders.</p>
        <p id="pageStatus" class="status" style="margin-top:0.6rem;" aria-live="polite"></p>
      </div>

      <!-- Tab bar -->
      <div class="tab-bar">
        <button class="tab-btn active" id="tabQuotations" type="button">📋 Quotations</button>
        <button class="tab-btn" id="tabSalesOrder" type="button">🛒 Sales Order</button>
      </div>

      <!-- ═══ QUOTATION SECTION ═══ -->
      <div id="quotationSection">

        <div class="panel">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:1rem;">
            <div>
              <h2 style="font-family:'Bricolage Grotesque',sans-serif;font-size:1.1rem;">Quotation List</h2>
              <p class="muted" style="font-size:0.86rem;margin-top:0.2rem;">Create, track, and convert quotes into sales orders.</p>
            </div>
            <div style="display:flex;gap:0.6rem;flex-wrap:wrap;align-items:center;">
              <select id="quoteStatusFilter" style="background:var(--panel-soft);border:1px solid var(--line);border-radius:10px;color:var(--text);font:inherit;font-size:0.84rem;padding:0.45rem 0.65rem;outline:none;">
                <option value="">All Statuses</option>
                <option value="draft">Draft</option>
                <option value="sent">Sent</option>
                <option value="accepted">Accepted</option>
                <option value="declined">Declined</option>
                <option value="expired">Expired</option>
              </select>
              <button class="btn alt" id="refreshQuotesBtn" type="button" style="font-size:0.82rem;padding:0.45rem 0.8rem;">↻ Refresh</button>
              <button class="btn main" id="newQuoteBtn" type="button">+ New Quotation</button>
            </div>
          </div>

          <p id="quotationStatus" class="status" style="margin-bottom:0.5rem;" aria-live="polite"></p>

          <div class="quote-table-wrap">
            <table class="quote-table">
              <thead>
                <tr>
                  <th>Quote #</th>
                  <th>Customer</th>
                  <th>Items</th>
                  <th>Total</th>
                  <th>Status</th>
                  <th>Valid Until</th>
                  <th>Created</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="quotationTableBody">
                <tr><td class="quote-empty" colspan="8">Loading quotations…</td></tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>

      <!-- ═══ SALES ORDER SECTION ═══ -->
      <div id="salesOrderSection" hidden>

        <!-- Left: Product Catalog (add more items) -->
        <div class="panel">
          <h2 style="font-family:'Bricolage Grotesque',sans-serif;font-size:1.1rem;">Available Packages</h2>
          <p class="muted" style="margin-top:0.25rem;font-size:0.88rem;">Add items to your cart from the current product catalog.</p>
          <div id="productMiniGrid" class="product-mini-grid"></div>
        </div>

        <!-- Right: Cart + Checkout -->
        <div style="display:grid;gap:1rem;">

          <!-- Cart -->
          <div class="panel cart-section">
            <div class="panel-header" style="margin-bottom:0.5rem;">
              <div>
                <h2 style="font-family:'Bricolage Grotesque',sans-serif;font-size:1.1rem;">Your Cart</h2>
                <p class="muted" style="font-size:0.86rem;margin-top:0.2rem;" id="cartCount"></p>
              </div>
              <button class="btn alt" id="clearCartBtn" type="button" style="font-size:0.82rem;padding:0.4rem 0.8rem;">Clear Cart</button>
            </div>
            <ul id="cartItems" class="cart-items">
              <li class="cart-empty">Your cart is empty.</li>
            </ul>
            <div class="cart-summary">
              <span>Total</span>
              <span class="cart-total-amount" id="cartTotal">$0</span>
            </div>
          </div>

          <!-- Checkout -->
          <div class="panel checkout-section">
            <h2 style="font-family:'Bricolage Grotesque',sans-serif;font-size:1.1rem;margin-bottom:0.9rem;">Checkout</h2>

            <form id="checkoutForm" novalidate>
              <div style="display:grid;gap:0.7rem;">
                <div class="field">
                  <label for="checkoutName">Full name *</label>
                  <input id="checkoutName" name="checkoutName" type="text" placeholder="John Smith" autocomplete="name" required />
                </div>
                <div class="field">
                  <label for="checkoutEmail">Email address *</label>
                  <input id="checkoutEmail" name="checkoutEmail" type="email" placeholder="admin@adtech-biz.com" autocomplete="email" required />
                </div>
                <div class="field">
                  <label for="checkoutPaymentMethod">Payment method</label>
                  <select id="checkoutPaymentMethod" name="checkoutPaymentMethod">
                    <option value="card">Card (Visa / Mastercard)</option>
                    <option value="cash">Cash</option>
                    <option value="bank_transfer">Bank Transfer</option>
                  </select>
                </div>

                <div id="paymentBadges" class="payment-badges">
                  <span class="payment-badge visa">Visa</span>
                  <span class="payment-badge mastercard">Mastercard</span>
                </div>

                <p id="paymentNote" class="payment-note">Secure card checkout powered by Stripe. Visa and Mastercard are accepted.</p>
                <div id="cardElement" class="card-element-shell" aria-label="Card details"></div>
                <p id="paymentHint" class="payment-hint">Use a Visa or Mastercard to complete payment.</p>

                <div id="bankTransferDetails" class="bank-transfer-details" hidden>
                  <p class="bank-transfer-title">Bank Transfer Details</p>
                  <ul class="bank-transfer-list">
                    <li><span>Bank:</span> AD Tech Business Bank</li>
                    <li><span>Account Name:</span> AD Tech Enterprise Ltd</li>
                    <li><span>Account Number:</span> 0012345678</li>
                    <li><span>Routing / Sort Code:</span> 021-000-021</li>
                    <li><span>Reference:</span> Use your invoice number</li>
                  </ul>
                </div>

                <div class="checkout-actions">
                  <button class="btn main" id="placeOrderBtn" type="submit" disabled>Pay with Card</button>
                  <p id="checkoutStatus" class="status" aria-live="polite"></p>
                </div>
              </div>
            </form>
          </div>

        </div>
      </div>

      </div><!-- end salesOrderSection -->
    </div>

    <!-- ═══ New Quotation Modal ═══ -->
    <div class="modal-overlay" id="quoteModal" hidden>
      <div class="modal-box">
        <div class="modal-header">
          <h2 style="font-family:'Bricolage Grotesque',sans-serif;font-size:1.1rem;" id="quoteModalTitle">New Quotation</h2>
          <button class="modal-close" id="quoteModalClose" type="button" aria-label="Close">✕</button>
        </div>

        <form id="quoteForm" novalidate>
          <div style="display:grid;gap:0.8rem;">

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.7rem;">
              <div class="field">
                <label for="qCustomerName">Customer Name *</label>
                <input id="qCustomerName" type="text" placeholder="John Smith" required />
              </div>
              <div class="field">
                <label for="qCustomerEmail">Email Address *</label>
                <input id="qCustomerEmail" type="email" placeholder="admin@adtech-biz.com" required />
              </div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.7rem;">
              <div class="field">
                <label for="qValidUntil">Valid Until</label>
                <input id="qValidUntil" type="date" />
              </div>
              <div class="field">
                <label for="qNotes">Notes</label>
                <input id="qNotes" type="text" placeholder="Optional internal notes" />
              </div>
            </div>

            <!-- Line items -->
            <div>
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.55rem;">
                <label style="color:var(--muted);font-size:0.85rem;font-weight:600;">Line Items *</label>
                <div style="display:flex;gap:0.5rem;align-items:center;">
                  <select id="qProductSelect" style="background:var(--panel-soft);border:1px solid var(--line);border-radius:9px;color:var(--text);font:inherit;font-size:0.82rem;padding:0.38rem 0.6rem;outline:none;max-width:200px;">
                    <option value="">+ Add from catalog…</option>
                  </select>
                  <button class="quote-action-btn" id="qAddBlankRow" type="button">+ Custom row</button>
                </div>
              </div>

              <div style="display:grid;grid-template-columns:1fr 80px 110px 32px;gap:0.35rem;margin-bottom:0.35rem;padding:0 0.1rem;">
                <span style="color:var(--muted);font-size:0.76rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;">Item</span>
                <span style="color:var(--muted);font-size:0.76rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;">Qty</span>
                <span style="color:var(--muted);font-size:0.76rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;">Unit Price $</span>
                <span></span>
              </div>

              <div class="line-items-list" id="lineItemsList"></div>
            </div>

            <div class="quote-total-row">
              <span>Total</span>
              <span class="quote-total-value" id="quoteTotalDisplay">$0</span>
            </div>

            <p id="quoteFormStatus" class="status" aria-live="polite"></p>

            <div style="display:flex;gap:0.7rem;justify-content:flex-end;flex-wrap:wrap;">
              <button class="btn alt" id="quoteModalCancelBtn" type="button">Cancel</button>
              <button class="btn main" id="quoteSubmitBtn" type="submit">Save Quotation</button>
            </div>

          </div>
        </form>
      </div>
    </div>

    <script>
      const API_BASE_URL = window.location.protocol === "file:" ? "http://localhost:3000" : "";
      const apiUrl = (path) => `${API_BASE_URL}${path}`;
      const INVOICE_COMPANY_NAME = "AD Tech Solutions";
      const INVOICE_COMPANY_HEADER = "Enterprise Business System Services";

      // ── Tab switching ──────────────────────────────────────────────────────
      const tabQuotations  = document.getElementById("tabQuotations");
      const tabSalesOrder  = document.getElementById("tabSalesOrder");
      const quotationSection  = document.getElementById("quotationSection");
      const salesOrderSection = document.getElementById("salesOrderSection");

      const showTab = (tab) => {
        const isQ = tab === "quotations";
        tabQuotations.classList.toggle("active", isQ);
        tabSalesOrder.classList.toggle("active", !isQ);
        quotationSection.hidden  = !isQ;
        salesOrderSection.hidden = isQ;
        if (isQ) loadQuotations();
      };

      tabQuotations.addEventListener("click", () => showTab("quotations"));
      tabSalesOrder.addEventListener("click", () => showTab("sales"));

      // ── Admin token (shared from URL or sessionStorage) ────────────────────
      const adminTokenField = document.getElementById("adminTokenField");

      // Restore saved token from sessionStorage
      const _savedToken = sessionStorage.getItem("adtech-admin-token");
      if (_savedToken) adminTokenField.value = _savedToken;

      const getAdminToken = () => adminTokenField.value.trim();

      adminTokenField.addEventListener("input", () => {
        const val = adminTokenField.value.trim();
        if (val) sessionStorage.setItem("adtech-admin-token", val);
        else sessionStorage.removeItem("adtech-admin-token");
      });

      adminTokenField.addEventListener("keydown", (e) => { if (e.key === "Enter") loadQuotations(); });

      const adminFetch = (url, opts = {}) => {
        const token = getAdminToken();
        const headers = { "Content-Type": "application/json", ...(opts.headers || {}) };
        if (token) headers["x-admin-token"] = token;
        return fetch(apiUrl(url), { ...opts, headers });
      };

      // ── Quotation helpers ──────────────────────────────────────────────────
      const qCurrency = (n) =>
        new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(n || 0);

      const fmtDateShort = (iso) => {
        if (!iso) return "—";
        return new Date(iso).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
      };

      const statusPillClass = { draft: "qs-draft", sent: "qs-sent", accepted: "qs-accepted", declined: "qs-declined", expired: "qs-expired" };

      const quotationStatusNode = document.getElementById("quotationStatus");
      const quotationTableBody  = document.getElementById("quotationTableBody");
      const quoteStatusFilter   = document.getElementById("quoteStatusFilter");
      const refreshQuotesBtn    = document.getElementById("refreshQuotesBtn");
      const newQuoteBtn         = document.getElementById("newQuoteBtn");

      const setQuoteStatus = (msg, type = "") => {
        quotationStatusNode.textContent = msg;
        quotationStatusNode.className = "status" + (type ? " " + type : "");
      };

      const renderQuotationTable = (quotations) => {
        if (!quotations.length) {
          quotationTableBody.innerHTML = '<tr><td class="quote-empty" colspan="8">No quotations yet. Click "+ New Quotation" to get started.</td></tr>';
          return;
        }

        quotationTableBody.innerHTML = quotations.map((q) => {
          const itemCount = q.items?.length || 0;
          const itemSummary = q.items?.slice(0, 2).map(i => i.name).join(", ") + (itemCount > 2 ? ` +${itemCount - 2} more` : "");
          const cls = statusPillClass[q.status] || "qs-draft";

          return `<tr>
            <td style="font-family:monospace;font-size:0.82rem;white-space:nowrap;">${q.quoteNumber}</td>
            <td>
              <div style="font-weight:600;">${q.customerName}</div>
              <div style="color:var(--muted);font-size:0.78rem;">${q.customerEmail}</div>
            </td>
            <td style="color:var(--muted);font-size:0.82rem;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${itemSummary || "—"}</td>
            <td style="font-weight:700;">${qCurrency(q.totalAmount)}</td>
            <td><span class="quote-status-pill ${cls}">${q.status}</span></td>
            <td style="color:var(--muted);font-size:0.82rem;">${q.validUntil ? fmtDateShort(q.validUntil) : "—"}</td>
            <td style="color:var(--muted);font-size:0.82rem;">${fmtDateShort(q.createdAt)}</td>
            <td>
              <div style="display:flex;gap:0.35rem;flex-wrap:wrap;">
                <button class="quote-action-btn" data-convert="${q.id}" title="Load this quote into Sales Order">→ Convert</button>
                ${q.status === "draft" ? `<button class="quote-action-btn" data-set-status="${q.id}" data-new-status="sent">Send</button>` : ""}
                ${(q.status === "sent") ? `<button class="quote-action-btn" data-set-status="${q.id}" data-new-status="accepted">Accept</button><button class="quote-action-btn danger" data-set-status="${q.id}" data-new-status="declined">Decline</button>` : ""}
                <button class="quote-action-btn danger" data-delete-quote="${q.id}" title="Delete this quotation">✕</button>
              </div>
            </td>
          </tr>`;
        }).join("");
      };

      const loadQuotations = async () => {
        setQuoteStatus("Loading…");
        const filter = quoteStatusFilter.value;
        const url = "/api/admin/quotations" + (filter ? `?status=${encodeURIComponent(filter)}` : "");
        try {
          const res = await adminFetch(url);
          const data = await res.json().catch(() => ({}));
          if (!res.ok) { setQuoteStatus(data.error || "Failed to load quotations.", "error"); return; }
          renderQuotationTable(data.quotations || []);
          setQuoteStatus(data.quotations?.length ? `${data.quotations.length} quotation${data.quotations.length === 1 ? "" : "s"}` : "");
        } catch (_) {
          setQuoteStatus("Could not reach server.", "error");
        }
      };

      quotationTableBody.addEventListener("click", async (e) => {
        const convertId = e.target.getAttribute("data-convert");
        const deleteId  = e.target.getAttribute("data-delete-quote");
        const setStatusId  = e.target.getAttribute("data-set-status");
        const newStatus    = e.target.getAttribute("data-new-status");

        if (convertId) {
          // Find the quotation data
          const row = e.target.closest("tr");
          const qNumber = row?.cells[0]?.textContent?.trim();
          const qName   = row?.cells[1]?.querySelector("div")?.textContent?.trim();
          const qEmail  = row?.cells[1]?.querySelectorAll("div")[1]?.textContent?.trim();
          // Re-fetch the quotation to get items
          try {
            const res = await adminFetch("/api/admin/quotations");
            const data = await res.json().catch(() => ({}));
            const q = (data.quotations || []).find(x => String(x.id) === String(convertId));
            if (!q) { setQuoteStatus("Could not find quotation data.", "error"); return; }
            convertQuoteToOrder(q);
          } catch (_) {
            setQuoteStatus("Could not load quotation items.", "error");
          }
          return;
        }

        if (setStatusId && newStatus) {
          try {
            const res = await adminFetch(`/api/admin/quotations/${setStatusId}/status`, {
              method: "PUT",
              body: JSON.stringify({ status: newStatus })
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok) { setQuoteStatus(data.error || "Failed to update status.", "error"); return; }
            setQuoteStatus(`Quote marked as ${newStatus}.`, "success");
            loadQuotations();
          } catch (_) { setQuoteStatus("Could not update status.", "error"); }
          return;
        }

        if (deleteId) {
          if (!confirm("Delete this quotation? This cannot be undone.")) return;
          try {
            const res = await adminFetch(`/api/admin/quotations/${deleteId}`, { method: "DELETE" });
            if (!res.ok) { const d = await res.json().catch(() => ({})); setQuoteStatus(d.error || "Failed to delete.", "error"); return; }
            setQuoteStatus("Quotation deleted.", "success");
            loadQuotations();
          } catch (_) { setQuoteStatus("Could not delete quotation.", "error"); }
        }
      });

      const convertQuoteToOrder = (q) => {
        // Load items into cart
        cartState = {};
        q.items.forEach((item) => {
          if (item.id && productCatalog[item.id]) {
            cartState[item.id] = (cartState[item.id] || 0) + item.quantity;
          }
        });
        saveCart();
        renderCart();

        // Pre-fill checkout form
        const nameEl  = document.getElementById("checkoutName");
        const emailEl = document.getElementById("checkoutEmail");
        if (nameEl)  nameEl.value  = q.customerName;
        if (emailEl) emailEl.value = q.customerEmail;

        // Switch to Sales Order tab
        showTab("sales");
        setCheckoutStatus(`Loaded from quotation ${q.quoteNumber}. Items not in current catalog were skipped.`, "#9ef3db");
        document.getElementById("pageStatus").textContent = "";
      };

      quoteStatusFilter.addEventListener("change", loadQuotations);
      refreshQuotesBtn.addEventListener("click", loadQuotations);

      // ── New Quote Modal ────────────────────────────────────────────────────
      const quoteModal         = document.getElementById("quoteModal");
      const quoteForm          = document.getElementById("quoteForm");
      const quoteModalClose    = document.getElementById("quoteModalClose");
      const quoteModalCancelBtn = document.getElementById("quoteModalCancelBtn");
      const quoteSubmitBtn     = document.getElementById("quoteSubmitBtn");
      const lineItemsList      = document.getElementById("lineItemsList");
      const quoteTotalDisplay  = document.getElementById("quoteTotalDisplay");
      const qProductSelect     = document.getElementById("qProductSelect");
      const qAddBlankRow       = document.getElementById("qAddBlankRow");
      const quoteFormStatus    = document.getElementById("quoteFormStatus");

      let lineItemsData = []; // { id, name, qty, unitPrice }

      const updateQuoteTotal = () => {
        const total = lineItemsData.reduce((s, row) => s + (row.qty * row.unitPrice), 0);
        quoteTotalDisplay.textContent = qCurrency(total);
      };

      const renderLineItems = () => {
        if (!lineItemsData.length) {
          lineItemsList.innerHTML = '<p style="color:var(--muted);font-size:0.86rem;padding:0.5rem 0;">No items yet. Add from catalog or add a custom row.</p>';
          updateQuoteTotal();
          return;
        }
        lineItemsList.innerHTML = lineItemsData.map((item, idx) => `
          <div class="line-item-row" data-row="${idx}">
            <input type="text" value="${item.name}" placeholder="Item name" data-field="name" data-row="${idx}" />
            <input type="number" value="${item.qty}" min="1" placeholder="Qty" data-field="qty" data-row="${idx}" />
            <input type="number" value="${item.unitPrice}" min="0" placeholder="Unit price" data-field="unitPrice" data-row="${idx}" />
            <button class="line-item-remove" type="button" data-remove-row="${idx}" title="Remove">✕</button>
          </div>
        `).join("");
        updateQuoteTotal();
      };

      lineItemsList.addEventListener("input", (e) => {
        const idx   = parseInt(e.target.getAttribute("data-row"), 10);
        const field = e.target.getAttribute("data-field");
        if (!field || isNaN(idx)) return;
        if (field === "name") lineItemsData[idx].name = e.target.value;
        if (field === "qty") lineItemsData[idx].qty = Math.max(1, parseInt(e.target.value, 10) || 1);
        if (field === "unitPrice") lineItemsData[idx].unitPrice = Math.max(0, parseInt(e.target.value, 10) || 0);
        updateQuoteTotal();
      });

      lineItemsList.addEventListener("click", (e) => {
        const removeIdx = e.target.getAttribute("data-remove-row");
        if (removeIdx !== null) {
          lineItemsData.splice(parseInt(removeIdx, 10), 1);
          renderLineItems();
        }
      });

      qAddBlankRow.addEventListener("click", () => {
        lineItemsData.push({ id: null, name: "", qty: 1, unitPrice: 0 });
        renderLineItems();
        // Focus the last name input
        const inputs = lineItemsList.querySelectorAll("input[data-field='name']");
        if (inputs.length) inputs[inputs.length - 1].focus();
      });

      qProductSelect.addEventListener("change", () => {
        const selected = qProductSelect.value;
        if (!selected || !productCatalog[selected]) { qProductSelect.value = ""; return; }
        const p = productCatalog[selected];
        lineItemsData.push({ id: p.id, name: p.name, qty: 1, unitPrice: p.price });
        renderLineItems();
        qProductSelect.value = "";
      });

      const openNewQuoteModal = () => {
        lineItemsData = [];
        quoteForm.reset();
        quoteFormStatus.textContent = "";
        renderLineItems();

        // Populate product select
        qProductSelect.innerHTML = '<option value="">+ Add from catalog…</option>' +
          Object.values(productCatalog).map(p => `<option value="${p.id}">${p.name} (${qCurrency(p.price)})</option>`).join("");

        quoteModal.hidden = false;
        document.getElementById("qCustomerName").focus();
      };

      const closeQuoteModal = () => { quoteModal.hidden = true; };

      newQuoteBtn.addEventListener("click", openNewQuoteModal);
      quoteModalClose.addEventListener("click", closeQuoteModal);
      quoteModalCancelBtn.addEventListener("click", closeQuoteModal);
      quoteModal.addEventListener("click", (e) => { if (e.target === quoteModal) closeQuoteModal(); });

      quoteForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const name  = document.getElementById("qCustomerName").value.trim();
        const email = document.getElementById("qCustomerEmail").value.trim();
        const validUntil = document.getElementById("qValidUntil").value.trim();
        const notes = document.getElementById("qNotes").value.trim();

        if (name.length < 2) { quoteFormStatus.textContent = "Enter a customer name."; quoteFormStatus.className = "status error"; return; }
        if (!name.match(/^[^\s@]+/) || !email.includes("@")) { quoteFormStatus.textContent = "Enter a valid email address."; quoteFormStatus.className = "status error"; return; }
        if (!lineItemsData.length) { quoteFormStatus.textContent = "Add at least one line item."; quoteFormStatus.className = "status error"; return; }

        const badItem = lineItemsData.find(i => !i.name.trim());
        if (badItem) { quoteFormStatus.textContent = "All line items must have a name."; quoteFormStatus.className = "status error"; return; }

        quoteSubmitBtn.disabled = true;
        quoteSubmitBtn.textContent = "Saving…";
        quoteFormStatus.textContent = "";

        const payload = {
          customerName: name,
          customerEmail: email,
          items: lineItemsData.map(i => ({ id: i.id || null, name: i.name.trim(), quantity: i.qty, unitPrice: i.unitPrice })),
          notes,
          validUntil: validUntil || undefined
        };

        try {
          const res = await adminFetch("/api/admin/quotations", { method: "POST", body: JSON.stringify(payload) });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) { quoteFormStatus.textContent = data.error || "Failed to save quotation."; quoteFormStatus.className = "status error"; return; }
          closeQuoteModal();
          setQuoteStatus(`Quotation ${data.quotation.quoteNumber} created.`, "success");
          loadQuotations();
        } catch (_) {
          quoteFormStatus.textContent = "Could not reach server.";
          quoteFormStatus.className = "status error";
        } finally {
          quoteSubmitBtn.disabled = false;
          quoteSubmitBtn.textContent = "Save Quotation";
        }
      });

      // ── State ──────────────────────────────────────────────────────────────
      let cartState = JSON.parse(localStorage.getItem("adtech-cart") || "{}");
      let productCatalog = {};
      let stripeConfigPromise;
      let stripeInstance;
      let stripeElements;
      let cardElement;
      let suppressCheckoutStatusError = false;

      const cartEmailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      // ── DOM refs ───────────────────────────────────────────────────────────
      const cartItemsNode        = document.getElementById("cartItems");
      const cartTotalNode        = document.getElementById("cartTotal");
      const cartCountNode        = document.getElementById("cartCount");
      const checkoutForm         = document.getElementById("checkoutForm");
      const checkoutStatus       = document.getElementById("checkoutStatus");
      const placeOrderBtn        = document.getElementById("placeOrderBtn");
      const paymentMethodSelect  = document.getElementById("checkoutPaymentMethod");
      const paymentBadgesNode    = document.getElementById("paymentBadges");
      const paymentNoteNode      = document.getElementById("paymentNote");
      const paymentHintNode      = document.getElementById("paymentHint");
      const bankTransferDetailsNode = document.getElementById("bankTransferDetails");
      const cardElementNode      = document.getElementById("cardElement");
      const productMiniGrid      = document.getElementById("productMiniGrid");
      const pageStatus           = document.getElementById("pageStatus");
      const clearCartBtn         = document.getElementById("clearCartBtn");

      // ── Helpers ────────────────────────────────────────────────────────────
      const currency = (amount) =>
        new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(amount);

      const saveCart = () => localStorage.setItem("adtech-cart", JSON.stringify(cartState));

      const getCartEntries = () => Object.entries(cartState).filter(([, qty]) => qty > 0);

      const buildOrderItems = () =>
        getCartEntries().map(([productId, qty]) => ({ id: productId, quantity: qty }));

      const setCheckoutStatus = (message, color = "#ffb2b8") => {
        checkoutStatus.textContent = message;
        checkoutStatus.style.color = color;
      };

      const setPageStatus = (message, type = "") => {
        pageStatus.textContent = message;
        pageStatus.className = "status" + (type ? " " + type : "");
      };

      // ── Payment method config ──────────────────────────────────────────────
      const paymentMethodConfig = {
        card: {
          buttonText: "Pay with Card",
          processingText: "Processing Card Payment…",
          note: "Secure card checkout powered by Stripe. Visa and Mastercard are accepted.",
          hint: "Use a Visa or Mastercard to complete payment."
        },
        cash: {
          buttonText: "Place Cash Order",
          processingText: "Saving Cash Order…",
          note: "Cash orders are saved as pending until payment is received.",
          hint: "An invoice is generated now for accounting and cash reconciliation."
        },
        bank_transfer: {
          buttonText: "Place Bank Transfer Order",
          processingText: "Saving Bank Transfer Order…",
          note: "Bank transfer orders are saved as pending until funds are received.",
          hint: "Use the invoice number as your transfer reference."
        }
      };

      const normalizePaymentMethod = (value) => {
        const method = String(value || "card").trim().toLowerCase().replace(/\s+/g, "_");
        return Object.prototype.hasOwnProperty.call(paymentMethodConfig, method) ? method : "card";
      };

      const getSelectedPaymentMethod = () => normalizePaymentMethod(paymentMethodSelect.value);

      const formatPaymentMethodLabel = (value) => {
        const m = normalizePaymentMethod(value);
        if (m === "bank_transfer") return "Bank Transfer";
        if (m === "cash") return "Cash";
        return "Card";
      };

      const updatePaymentUI = () => {
        const method = getSelectedPaymentMethod();
        const cfg = paymentMethodConfig[method];
        const isCard = method === "card";

        paymentBadgesNode.hidden = !isCard;
        cardElementNode.hidden = !isCard;
        paymentNoteNode.textContent = cfg.note;
        paymentHintNode.textContent = cfg.hint;
        bankTransferDetailsNode.hidden = method !== "bank_transfer";
        placeOrderBtn.textContent = cfg.buttonText;

        if (isCard) {
          ensureStripeReady().catch((err) => {
            if (getSelectedPaymentMethod() === "card" && !suppressCheckoutStatusError) {
              setCheckoutStatus(err.message || "Card payments are unavailable right now.");
            }
          });
        }
      };

      // ── Stripe ─────────────────────────────────────────────────────────────
      const getStripeConfig = async () => {
        if (!stripeConfigPromise) {
          stripeConfigPromise = fetch(apiUrl("/api/stripe-config"))
            .then(async (res) => {
              if (!res.ok) throw new Error("Card payments are unavailable right now.");
              return res.json();
            })
            .catch((err) => { stripeConfigPromise = undefined; throw err; });
        }
        return stripeConfigPromise;
      };

      const ensureStripeReady = async () => {
        if (cardElement) return;
        if (typeof window.Stripe !== "function") throw new Error("Stripe.js did not load.");
        const { publishableKey } = await getStripeConfig();
        if (!publishableKey) throw new Error("Card payments are not configured yet.");
        stripeInstance = window.Stripe(publishableKey);
        stripeElements = stripeInstance.elements({
          appearance: {
            theme: "night",
            variables: { colorPrimary: "#1bc6b0", colorText: "#f4fdff", colorBackground: "transparent" }
          }
        });
        cardElement = stripeElements.create("card", { hidePostalCode: true });
        cardElement.mount("#cardElement");
        cardElement.on("change", (event) => {
          if (event.error) { setCheckoutStatus(event.error.message, "#ffb2b8"); return; }
          if (!event.empty) setCheckoutStatus("Card details look good.", "#9ef3db");
        });
      };

      // ── Invoice PDF ────────────────────────────────────────────────────────
      const buildInvoiceSnapshot = ({ customerName, customerEmail, cartEntries, paymentMethod = "card" }) => {
        const items = cartEntries.map(([productId, quantity]) => {
          const product = productCatalog[productId];
          if (!product) return null;
          return { id: product.id, name: product.name, quantity, unitPrice: product.price, lineTotal: product.price * quantity };
        }).filter(Boolean);
        const totalAmount = items.reduce((sum, item) => sum + item.lineTotal, 0);
        return { customerName, customerEmail, items, totalAmount, paymentMethod, createdAtIso: new Date().toISOString() };
      };

      const downloadInvoicePdf = async (invoiceData, invoiceMeta = {}) => {
        const JsPdfCtor = window.jspdf?.jsPDF;
        if (!JsPdfCtor) throw new Error("Invoice PDF engine is unavailable.");

        const meta = typeof invoiceMeta === "string" ? { paymentIntentId: invoiceMeta } : invoiceMeta || {};
        const doc = new JsPdfCtor({ unit: "pt", format: "a4" });
        const marginX = 42;
        const pageWidth = doc.internal.pageSize.getWidth();
        const pageHeight = doc.internal.pageSize.getHeight();
        let y = 36;

        doc.setFontSize(14); doc.setTextColor(22, 40, 62);
        doc.text(INVOICE_COMPANY_NAME, marginX, y + 14);
        doc.setFontSize(9); doc.setTextColor(70, 86, 104);
        doc.text(INVOICE_COMPANY_HEADER, marginX, y + 28);
        y += 50;

        doc.setFontSize(18); doc.setTextColor(0, 0, 0);
        doc.text("INVOICE", marginX, y); y += 22;

        const invoiceId = meta.invoiceNumber || meta.paymentIntentId || `INV-${Date.now()}`;
        const genDate = new Date(invoiceData.createdAtIso || Date.now()).toLocaleString("en-US");
        const pmLabel = formatPaymentMethodLabel(meta.paymentMethod || invoiceData.paymentMethod || "card");
        const pmStatus = String(meta.status || "paid").toUpperCase();

        doc.setFontSize(10); doc.setTextColor(80, 80, 80);
        doc.text(`Invoice Number: ${invoiceId}`, marginX, y);
        doc.text(`Date: ${genDate}`, marginX + 250, y); y += 16;
        doc.text(`Bill To: ${invoiceData.customerName}`, marginX, y);
        doc.text(`Email: ${invoiceData.customerEmail}`, marginX + 250, y); y += 14;
        doc.text(`Payment Term: ${pmLabel}`, marginX, y);
        doc.text(`Status: ${pmStatus}`, marginX + 250, y); y += 14;

        doc.setDrawColor(214, 218, 224);
        doc.line(marginX, y, pageWidth - marginX, y); y += 16;

        doc.setFontSize(10); doc.setTextColor(32, 45, 64);
        doc.text("Item", marginX, y);
        doc.text("Qty", marginX + 280, y);
        doc.text("Unit", marginX + 340, y);
        doc.text("Line Total", marginX + 430, y); y += 10;
        doc.line(marginX, y, pageWidth - marginX, y); y += 14;

        doc.setTextColor(0, 0, 0);
        invoiceData.items.forEach((item) => {
          if (y > pageHeight - 90) { doc.addPage(); y = 48; }
          doc.text(String(item.name), marginX, y, { maxWidth: 260 });
          doc.text(String(item.quantity), marginX + 280, y);
          doc.text(currency(item.unitPrice), marginX + 340, y);
          doc.text(currency(item.lineTotal), marginX + 430, y);
          y += 16;
        });

        y += 4;
        doc.line(marginX, y, pageWidth - marginX, y); y += 20;
        doc.setFontSize(12); doc.setTextColor(20, 34, 52);
        doc.text(`Total Amount: ${currency(invoiceData.totalAmount)}`, marginX + 310, y);
        y += 26;
        doc.setFontSize(9); doc.setTextColor(90, 90, 90);
        doc.text("Thank you for choosing AD Tech Solutions.", marginX, y);
        doc.save(`invoice-${invoiceId}-${new Date().toISOString().slice(0, 10)}.pdf`);
      };

      // ── Cart rendering ─────────────────────────────────────────────────────
      const renderCart = () => {
        const entries = getCartEntries();

        if (!entries.length) {
          cartItemsNode.innerHTML = '<li class="cart-empty">Your cart is empty.</li>';
          cartTotalNode.textContent = currency(0);
          cartCountNode.textContent = "";
          placeOrderBtn.disabled = true;
          return;
        }

        let total = 0;
        const markup = entries.map(([productId, qty]) => {
          const product = productCatalog[productId];
          const name = product ? product.name : productId;
          const lineTotal = product ? product.price * qty : 0;
          total += lineTotal;
          return `
            <li class="cart-item">
              <div class="cart-item-top">
                <span class="cart-item-name">${name}</span>
                <button class="remove-btn" type="button" data-remove-item="${productId}">Remove</button>
              </div>
              <div class="cart-item-controls">
                <button class="qty-btn" type="button" data-dec="${productId}">−</button>
                <span class="qty-value">${qty}</span>
                <button class="qty-btn" type="button" data-inc="${productId}">+</button>
                ${product ? `<span class="cart-item-meta" style="margin-left:0.5rem;">${currency(lineTotal)}</span>` : ""}
              </div>
            </li>
          `;
        }).join("");

        cartItemsNode.innerHTML = markup;
        cartTotalNode.textContent = currency(total);
        const totalQty = entries.reduce((s, [, q]) => s + q, 0);
        cartCountNode.textContent = `${totalQty} item${totalQty === 1 ? "" : "s"}`;
        placeOrderBtn.disabled = false;
      };

      const addToCart = (productId) => {
        cartState[productId] = (cartState[productId] || 0) + 1;
        saveCart();
        renderCart();
      };

      // ── Product mini catalog ────────────────────────────────────────────────
      const renderProductMiniGrid = (products) => {
        if (!products.length) {
          productMiniGrid.innerHTML = '<div class="product-empty">No packages available yet. Contact us for a custom quote.</div>';
          return;
        }
        productMiniGrid.innerHTML = products.map((product) => `
          <div class="product-mini-card">
            <span class="product-category-tag">${product.category || "General"}</span>
            <h4>${product.name}</h4>
            <p>${product.description}</p>
            <button class="btn alt" type="button" style="margin-top:0.5rem;font-size:0.82rem;padding:0.45rem 0.8rem;" data-add-to-cart="${product.id}">+ Add to Cart</button>
          </div>
        `).join("");
      };

      const loadProducts = async () => {
        setPageStatus("Loading catalog…");
        try {
          const res = await fetch(apiUrl("/api/products"));
          const payload = await res.json().catch(() => ({}));
          if (!res.ok || !Array.isArray(payload.products)) {
            setPageStatus("Could not load product catalog.", "error");
            renderProductMiniGrid([]);
            return;
          }
          payload.products.forEach((p) => { productCatalog[p.id] = p; });
          renderProductMiniGrid(payload.products);
          renderCart(); // Re-render cart now product names/prices are known
          setPageStatus("");
        } catch (_err) {
          setPageStatus("Could not reach server.", "error");
          renderProductMiniGrid([]);
        }
      };

      // ── Cart events ────────────────────────────────────────────────────────
      cartItemsNode.addEventListener("click", (event) => {
        const removeId = event.target.getAttribute("data-remove-item");
        const incId    = event.target.getAttribute("data-inc");
        const decId    = event.target.getAttribute("data-dec");

        if (removeId) {
          delete cartState[removeId];
          saveCart();
          renderCart();
          return;
        }
        if (incId) {
          cartState[incId] = (cartState[incId] || 0) + 1;
          saveCart();
          renderCart();
          return;
        }
        if (decId) {
          if ((cartState[decId] || 0) > 1) {
            cartState[decId]--;
          } else {
            delete cartState[decId];
          }
          saveCart();
          renderCart();
          return;
        }
      });

      clearCartBtn.addEventListener("click", () => {
        cartState = {};
        saveCart();
        renderCart();
      });

      productMiniGrid.addEventListener("click", (event) => {
        const addBtn = event.target.closest("[data-add-to-cart]");
        if (!addBtn) return;
        const productId = addBtn.getAttribute("data-add-to-cart");
        if (!productCatalog[productId]) return;
        addToCart(productId);
        setCheckoutStatus(`"${productCatalog[productId].name}" added to cart.`, "#9ef3db");
      });

      paymentMethodSelect.addEventListener("change", () => updatePaymentUI());

      // ── Checkout submission ────────────────────────────────────────────────
      checkoutForm.addEventListener("submit", async (event) => {
        event.preventDefault();

        const name    = checkoutForm.elements.checkoutName.value.trim();
        const email   = checkoutForm.elements.checkoutEmail.value.trim();
        const entries = getCartEntries();
        const method  = getSelectedPaymentMethod();
        const cfg     = paymentMethodConfig[method];

        if (!entries.length) { setCheckoutStatus("Your cart is empty."); return; }
        if (name.length < 2)  { setCheckoutStatus("Please enter your full name."); return; }
        if (!cartEmailPattern.test(email)) { setCheckoutStatus("Please enter a valid email address."); return; }

        const invoiceSnapshot = buildInvoiceSnapshot({ customerName: name, customerEmail: email, cartEntries: entries, paymentMethod: method });

        placeOrderBtn.disabled = true;
        placeOrderBtn.textContent = cfg.processingText;

        try {
          if (method === "card") {
            await ensureStripeReady();

            const paymentRes = await fetch(apiUrl("/api/create-payment-intent"), {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ customerName: name, customerEmail: email, items: buildOrderItems() })
            });
            const paymentPayload = await paymentRes.json().catch(() => ({}));
            if (!paymentRes.ok || !paymentPayload.clientSecret) throw new Error(paymentPayload.error || "Could not start card payment.");

            const result = await stripeInstance.confirmCardPayment(paymentPayload.clientSecret, {
              payment_method: { card: cardElement, billing_details: { name, email } }
            });
            if (result.error) throw new Error(result.error.message || "Card payment failed.");
            if (!result.paymentIntent || result.paymentIntent.status !== "succeeded") throw new Error("Payment was not completed.");

            const confirmRes = await fetch(apiUrl("/api/payment-success"), {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ paymentIntentId: result.paymentIntent.id })
            });
            const confirmPayload = await confirmRes.json().catch(() => ({}));
            if (!confirmRes.ok) throw new Error(confirmPayload.error || "Payment completed but confirmation failed.");

            try {
              await downloadInvoicePdf(invoiceSnapshot, {
                invoiceNumber: confirmPayload.invoice?.invoiceNumber,
                paymentIntentId: confirmPayload.invoice?.paymentIntentId || result.paymentIntent.id,
                status: confirmPayload.invoice?.status || "paid",
                paymentMethod: confirmPayload.invoice?.paymentMethod || "card"
              });
            } catch (_err) { setCheckoutStatus("Payment successful, but invoice download failed.", "#f5c97a"); }

            cartState = {};
            saveCart();
            renderCart();
            checkoutForm.reset();
            paymentMethodSelect.value = "card";
            suppressCheckoutStatusError = true;
            updatePaymentUI();
            setCheckoutStatus("Card payment successful. Invoice generated.", "#9ef3db");
            setTimeout(() => { suppressCheckoutStatusError = false; }, 1000);

          } else {
            const offlineRes = await fetch(apiUrl("/api/create-offline-order"), {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ customerName: name, customerEmail: email, items: buildOrderItems(), paymentMethod: method })
            });
            const offlinePayload = await offlineRes.json().catch(() => ({}));
            if (!offlineRes.ok) throw new Error(offlinePayload.error || "Could not create offline order.");

            const savedInvoice = offlinePayload.invoice || {};
            const invoiceForPdf = {
              customerName: savedInvoice.customerName || invoiceSnapshot.customerName,
              customerEmail: savedInvoice.customerEmail || invoiceSnapshot.customerEmail,
              items: Array.isArray(savedInvoice.items) && savedInvoice.items.length ? savedInvoice.items : invoiceSnapshot.items,
              totalAmount: Number(savedInvoice.totalAmount || invoiceSnapshot.totalAmount),
              paymentMethod: savedInvoice.paymentMethod || method,
              createdAtIso: savedInvoice.issuedAt || invoiceSnapshot.createdAtIso
            };

            try {
              await downloadInvoicePdf(invoiceForPdf, {
                invoiceNumber: savedInvoice.invoiceNumber,
                paymentIntentId: savedInvoice.paymentIntentId,
                status: savedInvoice.status || "pending",
                paymentMethod: savedInvoice.paymentMethod || method
              });
            } catch (_err) { setCheckoutStatus("Order saved, but invoice download failed.", "#f5c97a"); }

            cartState = {};
            saveCart();
            renderCart();
            checkoutForm.reset();
            paymentMethodSelect.value = "card";
            suppressCheckoutStatusError = true;
            updatePaymentUI();
            setCheckoutStatus(
              method === "cash"
                ? "Cash order saved as pending. Invoice generated."
                : "Bank transfer order saved as pending. Invoice generated.",
              "#9ef3db"
            );
            setTimeout(() => { suppressCheckoutStatusError = false; }, 1000);
          }
        } catch (err) {
          setCheckoutStatus(err.message || "Checkout failed. Please try again.");
        } finally {
          placeOrderBtn.disabled = !getCartEntries().length;
        }
      });

      // ── Init ───────────────────────────────────────────────────────────────
      renderCart();
      updatePaymentUI();
      loadProducts();
      loadQuotations();
    </script>
  </body>
</html>
